version: "3.9"

services:
  streamtorrent-backend:
    build: .
    container_name: streamtorrent-backend
    mem_limit: 512m
    mem_reservation: 128m
    restart: unless-stopped
    env_file: .env
    command: sh -c "npx prisma migrate deploy && node dist/index.js"
    ports:
      - "127.0.0.1:8080:8080"
    logging:
      driver: "json-file"
      options:
        "max-size": "10m"
        "max-file": "3"
