version: "3.9"

services:
  ts-backend-template:
    build: .
    container_name: ts-backend-template-api
    mem_limit: 512m
    mem_reservation: 128m
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:4009:3000"
    logging:
      driver: "json-file"
      options:
        "max-size": "10m"
        "max-file": "3"
